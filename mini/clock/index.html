<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/clock.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Clock</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="clock-main">
        <!-- Analog Clock -->
        <div class="analog-clock">
            <canvas id="analogCanvas"></canvas>
        </div>

        <!-- Digital Display -->
        <div class="digital-display">
            <div class="time-text" id="timeText">--:--:--</div>
            <div class="date-text" id="dateText">Yuklanmoqda...</div>
        </div>

        <!-- Status Bar -->
        <div class="info-row">
            <div class="info-item">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusLabel">Online</span>
            </div>
            <div class="info-item">
                <span id="timezoneLabel">UTC+5</span>
            </div>
            <div class="info-item">
                <span id="sourceLabel">Internet vaqti</span>
            </div>
        </div>

        <!-- Format Switch -->
        <div class="format-switch">
            <button class="format-option active" data-format="24h">24 soat</button>
            <button class="format-option" data-format="12h">12 soat</button>
        </div>

        <!-- Timezone Select -->
        <select class="select-input" id="timezoneSelect">
            <option value="local">Mahalliy vaqt</option>
            <option value="Asia/Tashkent">Toshkent (UTC+5)</option>
            <option value="Asia/Dubai">Dubay (UTC+4)</option>
            <option value="Asia/Tokyo">Tokio (UTC+9)</option>
            <option value="Europe/London">London (UTC+0)</option>
            <option value="America/New_York">Nyu-York (UTC-5)</option>
            <option value="America/Los_Angeles">Los-Anjeles (UTC-8)</option>
            <option value="Europe/Paris">Parij (UTC+1)</option>
            <option value="Asia/Shanghai">Shanxay (UTC+8)</option>
            <option value="Australia/Sydney">Sidney (UTC+10)</option>
        </select>

        <!-- Sync Button -->
        <button class="refresh-btn" id="syncBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Sinxronlash
        </button>

        <!-- Alarms Section -->
        <div class="alarms-section">
            <div class="section-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="13" r="8"/>
                        <path d="M12 9v4l2 2"/>
                    </svg>
                    Alarmlar
                </h2>
                <button class="add-alarm-btn" id="addAlarmBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Yangi
                </button>
            </div>
            <div class="alarms-list" id="alarmsList"></div>
        </div>
    </main>

    <!-- Alarm Modal -->
    <div class="modal-overlay" id="alarmModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="alarmModalTitle">Yangi alarm</h3>
                <button class="modal-close" id="closeAlarmModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Vaqt</label>
                    <input type="time" id="alarmTime" class="modal-input" value="07:00">
                </div>
                <div class="input-group">
                    <label>Nomi (ixtiyoriy)</label>
                    <input type="text" id="alarmLabel" class="modal-input" placeholder="Alarm nomi...">
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="alarmEnabled" checked>
                    <span>Faol</span>
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelAlarm">Bekor qilish</button>
                <button class="btn-primary" id="saveAlarm">Saqlash</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
