<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/bingo.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <!-- Orqaga tugmasi — root ga qaytadi -->
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            
            <!-- Breadcrumb: MRDEV / Bingo -->
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Bingo</span>
            </div>
        </div>
        
        <div class="header-actions">
            <!-- Mavzu tugmasi -->
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            
            <!-- Mini Apps Dropdown Trigger -->
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="app-main">
        <!-- LOBBY VIEW -->
        <div id="lobbyView">
            <!-- Stats Card -->
            <div class="card stats-card">
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-value" id="winStreak">0</div>
                        <div class="stat-label">Winstreak</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="xpPoints">0</div>
                        <div class="stat-label">XP</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="playerLevel">1</div>
                        <div class="stat-label">Daraja</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalGames">0</div>
                        <div class="stat-label">O'yinlar</div>
                    </div>
                </div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xpFill" style="width:0%"></div>
                </div>
                <div class="xp-text" id="xpText">0 / 100 XP</div>
            </div>

            <!-- Mode Selection -->
            <div class="card">
                <h2>O'yin rejimi</h2>
                <div class="mode-btns">
                    <button class="mode-btn active" id="offlineBtn">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        <span>2 kishi</span>
                        <small>Bir qurilmada</small>
                    </button>
                    <button class="mode-btn" id="botBtn">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="2" width="20" height="20" rx="5"/>
                            <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
                            <circle cx="15" cy="10" r="1.5" fill="currentColor"/>
                            <path d="M8 15c1.5 2 4.5 2 8 0"/>
                        </svg>
                        <span>Robot</span>
                        <small>Sun'iy intellekt</small>
                    </button>
                </div>

                <!-- Bot Difficulty Panel -->
                <div id="botPanel" class="bot-panel" style="display:none;">
                    <h3>Robot darajasi</h3>
                    <div class="slider-container">
                        <input type="range" id="difficultySlider" min="0" max="100" value="50" class="difficulty-slider">
                        <div class="slider-ticks">
                            <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
                        </div>
                    </div>
                    <div class="difficulty-info">
                        <div class="diff-icon" id="diffIcon">-</div>
                        <div class="diff-text">
                            <strong id="diffLabel">O'rta (50%)</strong>
                            <p id="diffDesc">Robot ba'zan xato qiladi</p>
                        </div>
                    </div>
                    <button class="btn-play-bot" id="startBotBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Robot bilan o'ynash
                    </button>
                </div>

                <!-- Start Offline Button -->
                <button class="btn-play-offline" id="startOfflineBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    2 kishi o'ynash
                </button>
            </div>

            <!-- Score Card -->
            <div class="card">
                <h3>Hisob</h3>
                <div class="score-row">
                    <div class="score-box x-score">
                        <span class="score-label">X</span>
                        <span class="score-value" id="scoreX">0</span>
                    </div>
                    <div class="score-divider">:</div>
                    <div class="score-box o-score">
                        <span class="score-label">O</span>
                        <span class="score-value" id="scoreO">0</span>
                    </div>
                    <div class="score-box draw-score">
                        <span class="score-label">Durang</span>
                        <span class="score-value" id="scoreDraw">0</span>
                    </div>
                </div>
            </div>

            <!-- History -->
            <div class="card">
                <h3>Oxirgi o'yinlar</h3>
                <div id="historyList">
                    <div class="history-empty">Hali o'yin tarixi yo'q</div>
                </div>
            </div>
        </div>

        <!-- GAME VIEW -->
        <div id="gameView" style="display:none;">
            <div class="card game-card">
                <div class="game-header">
                    <div class="game-mode-badge" id="gameModeBadge">Robot</div>
                    <div class="game-score-display">
                        <span class="game-score-x">X: <strong id="gameScoreX">0</strong></span>
                        <span class="game-score-o">O: <strong id="gameScoreO">0</strong></span>
                    </div>
                </div>

                <div class="turn-indicator" id="turnIndicator">
                    <span class="turn-dot x-dot"></span>
                    <span id="turnText">Navbat: X</span>
                </div>

                <!-- Bot Thinking -->
                <div class="bot-thinking" id="botThinking" style="display:none;">
                    <div class="thinking-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span>Robot o'ylamoqda...</span>
                </div>

                <!-- Game Grid -->
                <div class="bingo-grid" id="bingoGrid">
                    <button class="cell" data-idx="0"></button>
                    <button class="cell" data-idx="1"></button>
                    <button class="cell" data-idx="2"></button>
                    <button class="cell" data-idx="3"></button>
                    <button class="cell" data-idx="4"></button>
                    <button class="cell" data-idx="5"></button>
                    <button class="cell" data-idx="6"></button>
                    <button class="cell" data-idx="7"></button>
                    <button class="cell" data-idx="8"></button>
                </div>

                <!-- Result -->
                <div id="gameResult" class="game-result" style="display:none;"></div>

                <!-- Action Buttons -->
                <div class="game-btns">
                    <button class="btn btn-primary" id="restartBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                        Qayta o'ynash
                    </button>
                    <button class="btn btn-outline" id="backToLobbyBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        Lobby
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Level Up Animation -->
    <div class="level-up" id="levelUp"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
