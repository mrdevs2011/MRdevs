<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/timer.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Timer</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="timer-main">
        <!-- Progress Circle -->
        <div class="progress-circle">
            <svg viewBox="0 0 200 200" id="progressSvg">
                <circle cx="100" cy="100" r="90" fill="none" stroke="var(--border)" stroke-width="8"/>
                <circle cx="100" cy="100" r="90" fill="none" stroke="var(--accent)" stroke-width="8"
                        stroke-linecap="round" stroke-dasharray="565.48" stroke-dashoffset="0"
                        transform="rotate(-90 100 100)" id="progressCircle"/>
            </svg>
            <div class="progress-text">
                <div class="time-display" id="timeDisplay">01:00</div>
                <div class="time-status" id="timeStatus">Tayyor</div>
            </div>
        </div>

        <!-- Presets -->
        <div class="presets-row">
            <button class="preset-btn" data-seconds="60">1 daq</button>
            <button class="preset-btn" data-seconds="180">3 daq</button>
            <button class="preset-btn" data-seconds="300">5 daq</button>
            <button class="preset-btn" data-seconds="600">10 daq</button>
            <button class="preset-btn" data-seconds="900">15 daq</button>
            <button class="preset-btn" data-seconds="1800">30 daq</button>
            <button class="preset-btn" data-seconds="3600">60 daq</button>
        </div>

        <!-- Custom Input -->
        <div class="custom-input-row">
            <div class="input-item">
                <input type="number" id="hoursInput" class="time-input" value="0" min="0" max="99">
                <span class="input-label">Soat</span>
            </div>
            <div class="input-item">
                <input type="number" id="minutesInput" class="time-input" value="1" min="0" max="59">
                <span class="input-label">Daqiqa</span>
            </div>
            <div class="input-item">
                <input type="number" id="secondsInput" class="time-input" value="0" min="0" max="59">
                <span class="input-label">Sekund</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-row">
            <button class="ctrl-btn primary" id="startBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                Boshlash
            </button>
            <button class="ctrl-btn secondary" id="pauseBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                Pauza
            </button>
            <button class="ctrl-btn outline" id="resetBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                Tiklash
            </button>
        </div>

        <!-- History -->
        <div class="history-section">
            <div class="history-header">
                <h3>Oxirgi taymerlar</h3>
                <button class="clear-btn" id="clearHistoryBtn">Tozalash</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">Tarix bo'sh</div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
