<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Music | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/music.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <div id="up-bar"></div>
    <div id="up-txt">Saqlanmoqda... <span id="up-p">0</span>%</div>

    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Music</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <div class="music-wrapper">
        <!-- Explore Page -->
        <section id="page-explore" class="page active">
            <h1 class="music-page-title">Musiqalar</h1>
            <div id="audio-list"></div>
            <div class="load-more" id="load-more-indicator">Yuklanmoqda...</div>
        </section>

        <!-- Studio Page -->
        <section id="page-studio" class="page">
            <h1 class="music-page-title">Audio qo'shish</h1>
            <div class="studio-box">
                <div id="studio-viz" class="studio-viz"></div>
                <div id="timer" class="timer">00:00</div>
                <input type="text" id="rec-name" class="music-input" placeholder="Yozuv nomini kiriting...">
                <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
                    <button id="rec-trigger" class="btn-record">
                        <svg class="svg-icon" style="fill:var(--red);color:var(--red);" viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        </svg>
                    </button>
                    <button id="save-cloud" class="btn-save-music">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:5px;">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Saqlash
                    </button>
                    <button class="btn-upload-music" onclick="document.getElementById('file-in').click()">Yoki fayl yuklash</button>
                    <input type="file" id="file-in" hidden accept="audio/*">
                </div>
            </div>
        </section>
    </div>

    <!-- Bottom Nav -->
    <nav class="music-nav">
        <button class="music-nav-item active" data-page="page-explore">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Musiqalar</span>
        </button>
        <button class="music-nav-item" data-page="page-studio">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>Qo'shish</span>
        </button>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
