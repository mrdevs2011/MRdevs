<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitView | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/splitview.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">SplitView</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="split-main">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="grid-btns">
                <button class="grid-btn active" data-grid="1x1">1x1</button>
                <button class="grid-btn" data-grid="2x2">2x2</button>
                <button class="grid-btn" data-grid="3x3">3x3</button>
            </div>
            <div class="toolbar-actions">
                <button class="icon-btn" id="bookmarkBtn" title="Bookmark" aria-label="Bookmark">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                    </svg>
                </button>
                <button class="icon-btn" id="muteAllBtn" title="Ovozlarni o'chirish" aria-label="Ovozlarni o'chirish">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <line x1="23" y1="9" x2="17" y2="15"/>
                        <line x1="17" y1="9" x2="23" y2="15"/>
                    </svg>
                </button>
                <button class="icon-btn danger" id="clearAllBtn" title="Tozalash" aria-label="Tozalash">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Grid -->
        <div class="split-grid" id="splitGrid" data-grid="1x1"></div>

        <!-- Bookmark Panel -->
        <div class="bookmark-panel" id="bookmarkPanel" style="display:none;">
            <h3>Saqlangan URL'lar</h3>
            <div id="bookmarkList"></div>
        </div>
    </main>

    <!-- URL Dialog -->
    <div class="modal-overlay" id="urlModal">
        <div class="modal-card">
            <h3>URL kiriting</h3>
            <input type="text" id="urlInput" class="modal-input" placeholder="https://youtube.com/watch?v=...">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelUrl">Bekor qilish</button>
                <button class="btn btn-primary" id="loadUrl">Yuklash</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
