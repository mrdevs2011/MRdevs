<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/calculator.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Calculator</span>
            </div>
        </div>
        <div class="header-actions">
            <!-- Mavzu tugmasi -->
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            
            <!-- Tarix tugmasi -->
            <button class="icon-btn" id="historyToggle" title="Tarix" aria-label="Tarix">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </button>
            
            <!-- Mini Apps Dropdown Trigger -->
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="calc-main">
        <!-- Display -->
        <div class="display-section">
            <div class="expression-text" id="expression">0</div>
            <div class="result-text" id="result"></div>
        </div>

        <!-- Buttons -->
        <div class="buttons-grid">
            <button class="calc-btn func" data-action="clear">AC</button>
            <button class="calc-btn func" data-action="delete">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                    <line x1="18" y1="9" x2="12" y2="15"/>
                    <line x1="12" y1="9" x2="18" y2="15"/>
                </svg>
            </button>
            <button class="calc-btn func" data-action="percent">%</button>
            <button class="calc-btn op" data-action="operator" data-value="/">/</button>

            <button class="calc-btn num" data-action="number" data-value="7">7</button>
            <button class="calc-btn num" data-action="number" data-value="8">8</button>
            <button class="calc-btn num" data-action="number" data-value="9">9</button>
            <button class="calc-btn op" data-action="operator" data-value="*">x</button>

            <button class="calc-btn num" data-action="number" data-value="4">4</button>
            <button class="calc-btn num" data-action="number" data-value="5">5</button>
            <button class="calc-btn num" data-action="number" data-value="6">6</button>
            <button class="calc-btn op" data-action="operator" data-value="-">-</button>

            <button class="calc-btn num" data-action="number" data-value="1">1</button>
            <button class="calc-btn num" data-action="number" data-value="2">2</button>
            <button class="calc-btn num" data-action="number" data-value="3">3</button>
            <button class="calc-btn op" data-action="operator" data-value="+">+</button>

            <button class="calc-btn num wide" data-action="number" data-value="0">0</button>
            <button class="calc-btn num" data-action="number" data-value=".">.</button>
            <button class="calc-btn equals" data-action="calculate">=</button>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h3>Hisob-kitoblar tarixi</h3>
                <button class="clear-btn" id="clearHistoryBtn">Tozalash</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">Tarix bo'sh</div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
