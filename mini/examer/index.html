<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Examer | MRDEV</title>
    
    <!-- ==================== FLASH FIX: ENG BIRINCHI ==================== -->
    <script src="../../assets/js/core/theme-flash-fix.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/favicons/examer.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/dropdown.css">
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-left-side">
            <a href="../../" class="back-chevron" title="Orqaga" aria-label="Orqaga">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <div class="breadcrumb">
                <a href="../../" class="breadcrumb-link">MRDEV</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Examer</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim" aria-label="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="mrdev-user-trigger-mini" id="mrdevUserTriggerMini" aria-label="Foydalanuvchi menyusi">
                <div class="trigger-avatar" id="triggerAvatarMini">?</div>
                <span class="trigger-name" id="triggerNameMini">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main class="examer-main">
        <!-- TEACHER VIEW -->
        <div id="teacherView">
            <!-- Create Card -->
            <div class="card">
                <div class="card-header">
                    <h2>Yangi Exam yaratish</h2>
                    <span class="badge" id="questionCount">0 savol</span>
                </div>
                <input type="text" id="examName" class="input-field" placeholder="Exam nomi...">
                <textarea id="qText" class="input-field" placeholder="Savol matni..."></textarea>
                <div class="options-grid">
                    <input type="text" id="optA" class="input-field" placeholder="A variant">
                    <input type="text" id="optB" class="input-field" placeholder="B variant">
                    <input type="text" id="optC" class="input-field" placeholder="C variant">
                    <input type="text" id="optD" class="input-field" placeholder="D variant">
                </div>
                <select id="correctAnswer" class="input-field">
                    <option value="0">A - to'g'ri javob</option>
                    <option value="1">B - to'g'ri javob</option>
                    <option value="2">C - to'g'ri javob</option>
                    <option value="3">D - to'g'ri javob</option>
                </select>
                <button class="btn btn-primary" id="addQuestionBtn">Savol qo'shish</button>
                <div class="divider"></div>
                <div id="savedQuestions"></div>
                <button class="btn btn-success" id="saveExamBtn" disabled>Examni saqlash</button>
            </div>

            <!-- Search + My Exams -->
            <div class="card">
                <div class="card-header">
                    <h2>Exam'lar</h2>
                </div>
                <div class="search-row">
                    <input type="text" id="searchExamId" class="input-field" placeholder="Exam ID kiriting...">
                    <button class="btn btn-primary" id="searchBtn">Qidirish</button>
                </div>
                <div class="tabs-row">
                    <button class="tab-btn active" data-tab="my">Mening exam'larim</button>
                    <button class="tab-btn" data-tab="all">Barcha exam'lar</button>
                </div>
                <div id="examList"></div>
            </div>
        </div>

        <!-- EXAM VIEW -->
        <div id="examView" style="display:none;">
            <div class="card">
                <div class="card-header">
                    <h2 id="examTitle">Exam</h2>
                    <button class="icon-btn" id="exitExamBtn" title="Chiqish" aria-label="Chiqish">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="question-counter" id="qCounter"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options-list" id="optionsList"></div>
            </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="resultView" style="display:none;">
            <div class="card" id="resultCard"></div>
            <button class="btn btn-primary" id="backToTeacherBtn">Orqaga</button>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
