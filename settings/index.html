<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <base href="/settings/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="settings_title">Sozlamalar | MRDEV</title>
    <script src="../assets/js/core/theme-flash-fix.js"></script>
    <link rel="stylesheet" href="../style.css">
    <!-- Header, loading va boshqa core stillari -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/loading.css">
    <link rel="stylesheet" href="../assets/css/toast.css">
    <!-- Dropdown stillari (settings user dropdown uchun) -->
    <link rel="stylesheet" href="../assets/css/dropdown.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

<div class="settings-container">
    <div class="settings-header">
        <a href="../" class="settings-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span data-i18n="back">Bosh sahifa</span>
        </a>
        <h1 data-i18n="settings_title">Sozlamalar</h1>

        <!--
            SETTINGS USER DROPDOWN TRIGGER
            Tugmaga bosilganda faqat ma'lumot dropdown ochiladi:
              - To'liq ism
              - MRDEV ID
              - Ulangan qurilmalar
            Hech qanday logout/settings tugmasi yo'q.
            
            Auth yuklanguncha is-loading → skeleton.
            Auth resolve bo'lganda script.js is-loading ni olib tashlaydi.
        -->
        <button class="header-user-trigger is-loading" id="headerUserTrigger" aria-label="Foydalanuvchi menyusi">
            <div class="header-user-avatar">?</div>
            <div class="header-user-info">
                <span class="header-user-name" data-i18n="guest">Mehmon</span>
                <span class="header-user-role">Foydalanuvchi</span>
            </div>
            <svg class="header-user-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
    </div>

    <div class="settings-list">
        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </div>
                <div>
                    <h3 data-i18n="dark_mode">Qorong'i rejim</h3>
                    <p data-i18n="dark_mode_desc">Interfeys ranglarini o'zgartirish</p>
                </div>
            </div>
            <button class="toggle" id="themeToggle"></button>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <div>
                    <h3 data-i18n="notifications">Bildirishnomalar</h3>
                    <p data-i18n="notifications_desc">Parol xabarlari va yangiliklar</p>
                </div>
            </div>
            <button class="toggle" id="notifToggle"></button>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M12 2a14 14 0 0 0 0 20 14 14 0 0 0 0-20z"/>
                        <path d="M2 12h20"/>
                    </svg>
                </div>
                <div>
                    <h3 data-i18n="language">Til</h3>
                    <p data-i18n="language_desc">Platforma tilini tanlash</p>
                </div>
            </div>
            <div class="lang-selector">
                <button class="lang-option" data-lang="uz">
                    <img src="./flags/uz.svg" alt="O'zbekcha">
                    <span>O'zbekcha</span>
                </button>
                <button class="lang-option" data-lang="ru">
                    <img src="./flags/ru.svg" alt="Русский">
                    <span>Русский</span>
                </button>
                <button class="lang-option" data-lang="en">
                    <img src="./flags/eng.svg" alt="English">
                    <span>English</span>
                </button>
            </div>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </div>
                <div>
                    <h3 data-i18n="cache">Kesh va xotira</h3>
                    <p id="cacheSize">0 KB vaqtinchalik ma'lumot</p>
                </div>
            </div>
            <button class="clear-btn" id="clearCacheBtn" data-i18n="clear">Tozalash</button>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </div>
                <div>
                    <h3 data-i18n="account">Hisob</h3>
                    <p data-i18n="account_desc">Hisobdan chiqish yoki loyiha haqida</p>
                </div>
            </div>
            <div class="action-buttons">
                <button class="about-btn" id="aboutBtn" data-i18n="about">Loyiha haqida</button>
                <button class="logout-btn" id="logoutBtn" data-i18n="logout">Chiqish</button>
            </div>
        </div>
    </div>

    <div class="settings-footer">
        <p>MRDEV v8.0</p>
    </div>
</div>

<!-- ==================== SCRIPTS ====================
     TARTIB MUHIM:
     1. /env.js     — window.__ENV__ ni o'rnatadi (Firebase kalitlari)
     2. script.js   — type="module", barcha import'lar shu orqali
-->
<!-- Parol xabarlari modal (root dropdown bilan bir xil) -->
<div id="passNotifModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:450px;">
        <div class="modal-header">
            <h3 data-i18n="pass_notifications">Parol xabarlari</h3>
            <button class="modal-close" onclick="closePassNotifModal()" data-i18n="close">✕</button>
        </div>
        <div class="modal-body" id="passNotifList" style="max-height:60vh;overflow-y:auto;">
            <div style="text-align:center;padding:20px;color:var(--text-3);" data-i18n="loading">Yuklanmoqda...</div>
        </div>
    </div>
</div>

<script src="/env.js"></script>
<script type="module" src="./script.js"></script>
</body>
</html>
