<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>404 — Sahifa topilmadi | MRDEV</title>

    <script>
        (function(){
            try {
                var t = localStorage.getItem('mrdev-theme') || 'light';
                if (t === 'dark') document.documentElement.classList.add('dark-pre');
            } catch(e){}
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f7f6f3;
            --text: #1c1a17;
            --text-3: #7d7a74;
            --border: rgba(0, 0, 0, 0.07);
            --accent: #2a7de1;
            --accent-glow: rgba(42, 125, 225, 0.22);
            --font-sans: 'Instrument Sans', sans-serif;
            --font-mono: 'Geist Mono', monospace;
        }

        body.dark {
            --bg: #1a1a18;
            --text: #eeecea;
            --text-3: #848280;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #5c9eff;
            --accent-glow: rgba(92, 158, 255, 0.2);
        }

        html.dark-pre { background: #1a1a18; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            transition: background 0.3s ease;
            overflow: hidden;
        }

        /* 404 Glitch Effect */
        .error-num {
            font-family: var(--font-mono);
            font-size: clamp(100px, 20vw, 180px);
            font-weight: 600;
            line-height: 1;
            position: relative;
            color: var(--accent);
            letter-spacing: -2px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .error-num::before, .error-num::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .error-num::before { color: #ff00c1; z-index: -1; animation: glitch 4s infinite; }
        .error-num::after { color: #00fff9; z-index: -2; animation: glitch 4s infinite 2s; }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-3);
            max-width: 420px;
            line-height: 1.6;
            margin: 0 0 40px 0;
            padding: 0 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 99px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn:active { transform: scale(0.98); }

        /* Animations */
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            33% { transform: translate(-2px, 1px); }
            66% { transform: translate(2px, -1px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 13px;
            color: var(--text-3);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="error-num">404</div>
    
    <h1>Marshrut yo'qoldi</h1>
    
    <p>
        Siz qidirayotgan sahifa MRDEV tizimidan o'chirilgan 
        yoki manzili noto'g'ri kiritilgan.
    </p>

    <a href="./" class="btn">Bosh sahifaga qaytish</a>

    <script>
        (function() {
            var t = localStorage.getItem('mrdev-theme') || 'light';
            if (t === 'dark') document.body.classList.add('dark');
        })();
    </script>

</body>
</html>
