<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR VAULT</title>
    <link rel="icon" type="image/svg+xml" href="files.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #24A1DE; --primary-dark: #1a7fb0; --bg: #0e0e0e; --glass-bg: rgba(28, 28, 28, 0.7);
            --glass-card: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff; --text-secondary: rgba(255, 255, 255, 0.7); --success: #2ecc71; --error: #e74c3c;
            --warning: #f39c12; --pdf-color: #e74c3c; --doc-color: #2ecc71; --archive-color: #f39c12;
            --blur-amount: 40px; --border-radius-lg: 28px; --border-radius-md: 20px; --border-radius-sm: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(36, 161, 222, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(110, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: -1; transform: translateZ(0);
        }
        body.login-mode { display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app { display: none; } 
        body.app-mode .app { display: block; }
        body.login-mode .login-container { display: block; } 
        body.app-mode .login-container { display: none; }
        
        /* Login */
        .login-container { max-width: 400px; width: 100%; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        .login-card {
            background: var(--glass-card); backdrop-filter: blur(var(--blur-amount)); -webkit-backdrop-filter: blur(var(--blur-amount));
            padding: 40px 32px; border-radius: var(--border-radius-lg); text-align: center; box-shadow: var(--shadow);
            border: 1px solid var(--glass-border); transform: translateZ(0);
        }
        .login-logo { margin-bottom: 24px; }
        .login-logo img { width: 64px; height: 64px; filter: drop-shadow(0 4px 8px rgba(36, 161, 222, 0.3)); }
        .login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); letter-spacing: -0.5px; }
        .login-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label {
            display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--primary);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-label svg { width: 16px; height: 16px; }
        .input-field {
            width: 100%; padding: 14px 18px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm); color: var(--text); font-size: 16px; outline: none; transition: var(--transition);
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(36, 161, 222, 0.2); background: rgba(0,0,0,0.4); }
        .input-field::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .login-btn {
            width: 100%; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; padding: 16px; border-radius: var(--border-radius-sm); font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 24px; transition: var(--transition); box-shadow: 0 4px 16px rgba(36, 161, 222, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; margin-left: 6px; transition: color 0.2s; }
        .login-toggle { margin-top: 28px; font-size: 15px; color: var(--text-secondary); }
        .error-message { color: var(--error); font-size: 13px; text-align: center; min-height: 20px; margin-top: 12px; }
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Header */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount)); -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border); transform: translateZ(0);
        }
        .app-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .app-header h1 img { width: 28px; height: 28px; filter: drop-shadow(0 2px 4px rgba(36,161,222,0.4)); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 15px; font-weight: 500; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .logout-btn {
            background: var(--glass-card); border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 500; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .logout-btn svg { width: 16px; height: 16px; }
        .logout-btn:active { background: var(--error); border-color: var(--error); color: white; }

        .big-tabs {
            position: fixed; top: 65px; left: 0; right: 0; z-index: 99; padding: 12px 20px 0; display: flex; gap: 24px;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount)); -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border); transform: translateZ(0);
        }
        .big-tab {
            background: transparent; border: none; color: var(--text-secondary); font-size: 16px; font-weight: 600;
            padding: 0 0 12px 0; cursor: pointer; position: relative; transition: color 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .big-tab svg { width: 20px; height: 20px; }
        .big-tab.active { color: var(--primary); }
        .big-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 3px 3px 0 0; box-shadow: 0 -2px 8px rgba(36,161,222,0.5);
        }

        .category-tabs {
            position: fixed; top: 120px; left: 0; right: 0; z-index: 98; padding: 10px 16px;
            display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab {
            background: var(--glass-card); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            color: var(--text-secondary); padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .category-tab svg { width: 16px; height: 16px; }
        .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(36,161,222,0.3); }

        /* Content */
        .content { padding-top: 175px; padding-bottom: 90px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }
        .posts-feed { display: flex; flex-direction: column; gap: 20px; }
        .post-card {
            background: var(--glass-card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: var(--border-radius-md); border: 1px solid var(--glass-border); overflow: hidden;
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .post-avatar {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #6ec8ff);
            display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: white;
        }
        .post-info { flex: 1; }
        .post-author { font-weight: 600; font-size: 15px; color: var(--text); }
        .post-time { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .post-text { padding: 16px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .post-media { position: relative; cursor: pointer; background: rgba(0,0,0,0.3); }
        .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; display: block; }
        .post-media audio { width: 100%; margin: 16px 0; padding: 0 16px; }
        .post-category {
            display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: rgba(0,0,0,0.3);
            border-radius: 30px; font-size: 12px; margin: 12px 16px; color: var(--text-secondary); border: 1px solid var(--glass-border);
        }
        .post-actions { padding: 12px 16px; display: flex; gap: 16px; border-top: 1px solid var(--glass-border); }
        .post-actions button {
            background: transparent; border: none; color: var(--text-secondary); font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 8px 12px;
            border-radius: 30px; transition: var(--transition);
        }
        .post-actions button svg { width: 18px; height: 18px; }
        .post-actions button:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
        .delete-btn { color: var(--error) !important; margin-left: auto; }

        /* Blur Layer */
        .blur-layer {
            position: absolute; inset: 0; backdrop-filter: blur(100px) saturate(1.5); -webkit-backdrop-filter: blur(100px) saturate(1.5);
            background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: opacity 0.3s ease; z-index: 2;
        }
        .blur-content { text-align: center; color: white; }
        .blur-content svg { width: 48px; height: 48px; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .blur-text {
            font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* FAB */
        .fab {
            position: fixed; width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; box-shadow: 0 4px 24px rgba(36,161,222,0.5); cursor: grab; z-index: 200;
            display: flex; align-items: center; justify-content: center; bottom: 24px; right: 24px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab svg { width: 32px; height: 32px; stroke: white; stroke-width: 2; }
        .fab:active { cursor: grabbing; transform: scale(0.95); }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 300;
            display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; animation: fadeInModal 0.3s; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        .upload-modal {
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount)); -webkit-backdrop-filter: blur(var(--blur-amount));
            width: 100%; max-width: 500px; border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
            padding: 24px 24px 30px; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto; border: 1px solid var(--glass-border); border-bottom: none;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .modal-header h3 { font-size: 20px; font-weight: 600; }
        .close-modal {
            background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;
            padding: 8px; border-radius: 50%; transition: var(--transition);
        }
        .close-modal svg { width: 24px; height: 24px; }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--glass-border); border-radius: var(--border-radius-md);
            padding: 40px 20px; text-align: center; cursor: pointer; transition: var(--transition);
            margin-bottom: 20px; background: rgba(0,0,0,0.2);
        }
        .upload-icon svg { width: 48px; height: 48px; margin-bottom: 12px; color: var(--primary); }
        .preview-area { margin-bottom: 20px; text-align: center; }
        .preview-area img, .preview-area video { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: contain; }
        
        /* File Preview with Format Icons */
        .preview-file {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px 20px; background: rgba(0, 0, 0, 0.2); border-radius: var(--border-radius-sm);
            border: 1px solid var(--glass-border);
        }
        .preview-file .file-icon { margin-bottom: 16px; }
        .preview-file .file-icon svg { width: 64px; height: 64px; }
        .preview-file .file-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; word-break: break-all; text-align: center; }
        .preview-file .file-size { font-size: 12px; color: var(--text-secondary); }

        .caption-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm); padding: 16px; color: var(--text); font-size: 15px;
            resize: none; min-height: 100px; margin-bottom: 20px; transition: var(--transition); outline: none;
        }
        .caption-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }
        .option-group { margin-bottom: 24px; }
        .option-label {
            display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .option-label svg { width: 18px; height: 18px; color: var(--primary); }
        .category-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .category-option {
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 10px 16px; border-radius: 30px; font-size: 14px; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        .category-option svg { width: 16px; height: 16px; }
        .category-option.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(36,161,222,0.3); }
        .visibility-options { display: flex; gap: 24px; }
        .visibility-option { display: flex; align-items: center; gap: 10px; cursor: pointer; color: white; font-size: 15px; }
        .visibility-option input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .checkbox-group {
            display: flex; flex-direction: column; gap: 16px; background: rgba(0,0,0,0.2); padding: 16px;
            border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border);
        }
        .checkbox-item { display: flex; align-items: center; gap: 12px; cursor: pointer; color: white; font-size: 15px; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .upload-btn {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 18px; border-radius: var(--border-radius-sm);
            font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: var(--transition); box-shadow: 0 4px 15px rgba(36,161,222,0.4);
        }
        .upload-btn svg { width: 22px; height: 22px; }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; background: rgba(255,255,255,0.1); box-shadow: none; color: var(--text-secondary); }

        /* Viewer */
        .viewer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95);
            z-index: 400; display: none; flex-direction: column; backdrop-filter: blur(20px);
        }
        .viewer-overlay.show { display: flex; animation: fadeInModal 0.3s; }
        .viewer-header {
            position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; align-items: center;
            gap: 16px; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .back-btn {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: var(--transition);
        }
        .back-btn svg { width: 24px; height: 24px; }
        .viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; margin-top: 60px; }
        .viewer-content img, .viewer-content video { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .viewer-content audio { width: 100%; max-width: 500px; }

        /* Password Modal */
        .password-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount)); padding: 32px 24px;
            border-radius: var(--border-radius-md); z-index: 500; width: 90%; max-width: 360px;
            display: none; border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .password-modal.show { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .password-modal h4 { margin-bottom: 24px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 20px; }
        .password-modal h4 svg { width: 28px; height: 28px; color: var(--primary); }
        .password-modal input { width: 100%; margin-bottom: 20px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount)); color: var(--text);
            padding: 14px 28px; border-radius: 40px; font-size: 15px; font-weight: 500; z-index: 500;
            opacity: 0; visibility: hidden; transition: var(--transition); border: 1px solid var(--glass-border);
            max-width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(231, 76, 60, 0.9); color: white; border-color: rgba(255,255,255,0.2); }
        .toast.success { background: rgba(46, 204, 113, 0.9); color: white; border-color: rgba(255,255,255,0.2); }
        .toast.paste { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }

        /* Empty & Loading */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state svg { width: 72px; height: 72px; margin-bottom: 20px; opacity: 0.3; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 16px; }

        /* Paste Hint */
        .paste-hint {
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px;
            padding: 8px 16px; background: rgba(0, 0, 0, 0.2); border-radius: 30px; font-size: 12px;
            color: var(--text-secondary); border: 1px solid var(--glass-border);
        }
        .paste-hint kbd {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 6px;
            padding: 2px 8px; font-family: monospace; font-size: 11px; color: white;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-header { padding: 12px 16px; }
            .app-header h1 { font-size: 20px; }
            .big-tabs { padding: 10px 16px 0; }
            .category-tabs { padding: 10px 12px; }
            .content { padding-top: 175px; }
            .container { padding: 0 12px; }
            .post-card { border-radius: 20px; }
            .post-header { padding: 12px 16px; }
            .post-avatar { width: 40px; height: 40px; font-size: 16px; }
            .fab { width: 56px; height: 56px; bottom: 20px; right: 20px; }
            .fab svg { width: 28px; height: 28px; }
            .upload-modal { padding: 20px 16px 24px; border-radius: 24px 24px 0 0; }
            .upload-area { padding: 30px 16px; }
        }
    </style>
</head>
<body class="login-mode">
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="files.svg" alt="MR Vault">
            </div>
            <div class="login-title" id="loginTitle">Kirish</div>
            <div class="login-subtitle" id="loginSubtitle">Xush kelibsiz! Ma'lumotlarni kiriting.</div>
            <form id="loginForm">
                <div class="input-group" id="nameGroup" style="display: none;">
                    <label class="input-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        To'liq ismingiz
                    </label>
                    <input type="text" id="fullName" class="input-field" placeholder="Ismingiz" autocomplete="name">
                </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';

        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Config
        const firebaseConfig = {
            apiKey: "window.__ENV__?.MAIN_API_KEY || """,
            authDomain: "code-vibe-df610.firebaseapp.com",

            storageBucket: "code-vibe-df610.firebasestorage.app",

            appId: "1:747762490655:web:125516814620784cf3a42a"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const SUPABASE_URL = "window.__ENV__?.SUPABASE_URL || """;
        const SUPABASE_KEY = "window.__ENV__?.SUPABASE_KEY || """;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // State
        let currentUser = null, isLoginMode = true, allPosts = [], activeBigTab = 'my', activeCategory = 'all';
        let selectedFile = null, selectedCategory = 'boshqa', pendingPost = null;

        // DOM Elements
        const body = document.body, loginForm = document.getElementById('loginForm'), toggleFormBtn = document.getElementById('toggleFormBtn');
        const nameGroup = document.getElementById('nameGroup'), confirmGroup = document.getElementById('confirmGroup');
        const loginTitle = document.getElementById('loginTitle'), loginSubtitle = document.getElementById('loginSubtitle');
        const toggleText = document.getElementById('toggleText'), btnText = document.getElementById('btnText');
        const loginError = document.getElementById('loginError'), loginSpinner = document.getElementById('loginSpinner');
        const displayUserName = document.getElementById('displayUserName'), logoutBtn = document.getElementById('logoutBtn');
        const postsFeed = document.getElementById('postsFeed'), fabBtn = document.getElementById('fabBtn');
        const uploadModal = document.getElementById('uploadModal'), closeModalBtn = document.getElementById('closeModalBtn');
        const uploadArea = document.getElementById('uploadArea'), fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea'), captionInput = document.getElementById('captionInput');
        const uploadBtn = document.getElementById('uploadBtn'), blurCheck = document.getElementById('blurCheck');
        const passwordCheck = document.getElementById('passwordCheck'), passwordField = document.getElementById('passwordField');
        const postPassword = document.getElementById('postPassword');
        const viewerOverlay = document.getElementById('viewerOverlay'), viewerContent = document.getElementById('viewerContent'), closeViewerBtn = document.getElementById('closeViewerBtn');
        const passwordModal = document.getElementById('passwordModal'), passwordInput = document.getElementById('passwordInput');
        const submitPasswordBtn = document.getElementById('submitPasswordBtn'), cancelPasswordBtn = document.getElementById('cancelPasswordBtn');
        const passwordError = document.getElementById('passwordError'), toast = document.getElementById('toast');

        // ========== OVOZ EFFEKTLARI ==========
        const sounds = {
            success: new Audio('./success.wav'),
            notification: new Audio('./notification.wav'),
            info: new Audio('./info.wav'),
            click: new Audio('./click.wav'),
            delete: new Audio('./delete.wav'),
            error: new Audio('./error.wav')
        };
        Object.values(sounds).forEach(sound => { sound.load(); sound.volume = 0.4; });
        function playSound(soundName) { const sound = sounds[soundName]; if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log('Ovoz:', e)); } }

        // ========== AUTH ==========
        toggleFormBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                nameGroup.style.display = 'none'; confirmGroup.style.display = 'none';
                loginTitle.textContent = 'Kirish'; loginSubtitle.textContent = "Xush kelibsiz! Ma'lumotlarni kiriting.";
                toggleText.textContent = "Hisobingiz yo'qmi?"; toggleFormBtn.textContent = "Ro'yxatdan o'tish";
                btnText.textContent = 'KIRISH';
            } else {
                nameGroup.style.display = 'block'; confirmGroup.style.display = 'block';
                loginTitle.textContent = "Ro'yxatdan o'tish"; loginSubtitle.textContent = "Yangi hisob oching";
                toggleText.textContent = "Hisobingiz bormi?"; toggleFormBtn.textContent = 'Kirish';
                btnText.textContent = "RO'YXATDAN O'TISH";
            }
            loginError.textContent = '';
            playSound('click');
        });

        function usernameToEmail(username) { return `${username.toLowerCase().replace(/[^a-z0-9]/g, '')}@mrgram.user`; }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim(), password = document.getElementById('password').value;
            if (!username || username.length < 3) { loginError.textContent = 'Username kamida 3 ta belgi'; playSound('error'); return; }
            if (!password || password.length < 6) { loginError.textContent = 'Parol kamida 6 ta belgi'; playSound('error'); return; }
            loginSpinner.style.display = 'inline-block'; btnText.style.opacity = '0.5';
            try {
                const email = usernameToEmail(username);
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    playSound('success');
                } else {
                    const fullName = document.getElementById('fullName').value.trim(), confirmPassword = document.getElementById('confirmPassword').value;
                    if (!fullName) { loginError.textContent = 'Ismingizni kiriting'; playSound('error'); return; }
                    if (password !== confirmPassword) { loginError.textContent = 'Parollar mos kelmadi'; playSound('error'); return; }
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCred.user, { displayName: fullName });
                    await addDoc(collection(db, 'users'), { uid: userCred.user.uid, username, fullName, email, createdAt: serverTimestamp() });
                    playSound('success');
                }
            } catch (error) { loginError.textContent = error.message; playSound('error'); }
            finally { loginSpinner.style.display = 'none'; btnText.style.opacity = '1'; }
        });

        onAuthStateChanged(auth, (user) => {
            const loginContainer = document.querySelector('.login-container'), appElement = document.querySelector('.app');
            if (user) { 
                currentUser = user; 
                if (loginContainer) loginContainer.style.display = 'none';
                if (appElement) appElement.style.display = 'block';
                body.classList.remove('login-mode'); body.classList.add('app-mode'); 
                displayUserName.textContent = user.displayName || user.email?.split('@')[0] || 'User'; 
                loadPosts(); 
                playSound('notification');
            } else { 
                currentUser = null; 
                if (loginContainer) loginContainer.style.display = 'block';
                if (appElement) appElement.style.display = 'none';
                body.classList.add('login-mode'); body.classList.remove('app-mode'); 
            } 
        });
        
        logoutBtn.addEventListener('click', () => { playSound('click'); signOut(auth); });

        // ========== FAB ==========
        let isDragging = false, startX, startY, startLeft, startBottom;
        fabBtn.addEventListener('mousedown', dragStart); document.addEventListener('mousemove', dragMove); document.addEventListener('mouseup', dragEnd);
        fabBtn.addEventListener('touchstart', dragStart, {passive: false}); document.addEventListener('touchmove', dragMove, {passive: false}); document.addEventListener('touchend', dragEnd);
        function dragStart(e) { isDragging = true; const evt = e.touches ? e.touches[0] : e; startX = evt.clientX; startY = evt.clientY; const rect = fabBtn.getBoundingClientRect(); startLeft = rect.left; startBottom = window.innerHeight - rect.bottom; fabBtn.classList.add('dragging'); if(e.type === 'touchstart') e.preventDefault(); }
        function dragMove(e) { if (!isDragging) return; const evt = e.touches ? e.touches[0] : e; let newLeft = startLeft + evt.clientX - startX, newBottom = startBottom - (evt.clientY - startY); newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - 70)); newBottom = Math.max(70, Math.min(newBottom, window.innerHeight - 150)); fabBtn.style.left = newLeft + 'px'; fabBtn.style.right = 'auto'; fabBtn.style.bottom = newBottom + 'px'; if(e.type === 'touchmove') e.preventDefault(); }
        function dragEnd() { isDragging = false; fabBtn.classList.remove('dragging'); }
        fabBtn.addEventListener('click', () => { if (!fabBtn.classList.contains('dragging')) { uploadModal.classList.add('show'); playSound('click'); } });

        // ========== MODAL ==========
        closeModalBtn.addEventListener('click', () => { uploadModal.classList.remove('show'); resetForm(); playSound('click'); });
        uploadModal.addEventListener('click', (e) => { if (e.target === uploadModal) { uploadModal.classList.remove('show'); resetForm(); } });
        uploadArea.addEventListener('click', (e) => { e.stopPropagation(); fileInput.value = ''; fileInput.click(); });
        uploadArea.addEventListener('touchend', (e) => { e.preventDefault(); fileInput.value = ''; fileInput.click(); }, { passive: true });
        fileInput.addEventListener('change', (e) => { if (e.target.files && e.target.files[0]) { handleFile(e.target.files[0]); playSound('click'); } });

        // ========== PASTE ==========
        function handlePasteEvent(e, options = {}) {
            const { preventDefault = true, openModal = true } = options;
            const items = e.clipboardData?.items;
            if (!items) return false;
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file) {
                        if (preventDefault) e.preventDefault();
                        if (openModal && !uploadModal.classList.contains('show')) uploadModal.classList.add('show');
                        handleFile(file);
                        showToast(`${file.name} yuklandi`, 'paste');
                        playSound('success');
                        return true;
                    }
                }
            }
            return false;
        }
        captionInput.addEventListener('paste', (e) => handlePasteEvent(e, { preventDefault: true, openModal: false }));
        window.addEventListener('paste', (e) => { if (!uploadModal.classList.contains('show')) handlePasteEvent(e, { preventDefault: true, openModal: true }); });

        // ========== FORMAT ==========
        function getFileIcon(file) {
            const ext = file.name.split('.').pop()?.toLowerCase() || '', type = file.type;
            if (type.startsWith('image/')) return { icon: 'image', color: 'var(--primary)' };
            if (type.startsWith('video/')) return { icon: 'video', color: 'var(--primary)' };
            if (type.startsWith('audio/')) return { icon: 'audio', color: 'var(--primary)' };
            if (type === 'application/pdf' || ext === 'pdf') return { icon: 'pdf', color: 'var(--pdf-color)' };
            if (ext === 'doc' || ext === 'docx' || type.includes('word')) return { icon: 'doc', color: 'var(--doc-color)' };
            if (ext === 'xls' || ext === 'xlsx') return { icon: 'excel', color: '#27ae60' };
            if (ext === 'ppt' || ext === 'pptx') return { icon: 'ppt', color: '#e67e22' };
            if (ext === 'zip' || ext === 'rar' || ext === '7z') return { icon: 'archive', color: 'var(--archive-color)' };
            if (ext === 'txt') return { icon: 'txt', color: '#95a5a6' };
            return { icon: 'file', color: 'var(--text-secondary)' };
        }

        function getFileIconSVG(iconType) {
            const svgs = {
                image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="2.5"/><path d="M21 15l-5-5L6 21"/></svg>',
                video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>',
                audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>',
                pdf: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12v4M13 12v4"/><path d="M9 12h1.5a1.5 1.5 0 0 1 0 3H9"/><path d="M13 12h1.5a1.5 1.5 0 0 1 0 3H13"/></svg>',
                doc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg>',
                excel: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 12h8M8 16h8"/></svg>',
                ppt: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="14" r="2"/><path d="M16 14v4"/></svg>',
                archive: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
                txt: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
                file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
            };
            return svgs[iconType] || svgs.file;
        }

        function handleFile(file) { 
            if (!file) return;
            selectedFile = file; 
            previewArea.style.display = 'block'; 
            const fileType = file.type, fileExt = file.name.split('.').pop()?.toLowerCase() || '', fileSize = (file.size / 1024 / 1024).toFixed(2);
            const iconInfo = getFileIcon(file);
            if (fileType.startsWith('image/')) {
                previewArea.innerHTML = `<img src="${URL.createObjectURL(file)}" alt="Preview" style="max-width:100%;max-height:200px;border-radius:8px;" onload="URL.revokeObjectURL(this.src)">`;
            } else if (fileType.startsWith('video/')) {
                previewArea.innerHTML = `<video src="${URL.createObjectURL(file)}" controls style="max-width:100%;max-height:200px;border-radius:8px;"></video>`;
            } else {
                previewArea.innerHTML = `<div class="preview-file"><div class="file-icon" style="color: ${iconInfo.color}">${getFileIconSVG(iconInfo.icon)}</div><div class="file-name">${file.name}</div><div class="file-size">${fileSize} MB · ${fileExt.toUpperCase()}</div></div>`;
            }
            uploadBtn.disabled = false; 
        }

        function resetForm() { 
            selectedFile = null; fileInput.value = ''; previewArea.style.display = 'none'; previewArea.innerHTML = ''; 
            captionInput.value = ''; uploadBtn.disabled = true; blurCheck.checked = false; passwordCheck.checked = false; 
            passwordField.style.display = 'none'; postPassword.value = ''; 
            document.querySelectorAll('.category-option').forEach(o => o.classList.remove('active')); 
            document.querySelector('[data-cat="boshqa"]').classList.add('active'); selectedCategory = 'boshqa'; 
        }

        document.querySelectorAll('.category-option').forEach(option => { option.addEventListener('click', function() { document.querySelectorAll('.category-option').forEach(c => c.classList.remove('active')); this.classList.add('active'); selectedCategory = this.dataset.cat; }); });
        passwordCheck.addEventListener('change', () => passwordField.style.display = passwordCheck.checked ? 'block' : 'none');

        async function hashPassword(pwd) { const encoder = new TextEncoder(); const data = encoder.encode(pwd); const hash = await crypto.subtle.digest('SHA-256', data); return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join(''); }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !currentUser) return;
            uploadBtn.disabled = true; uploadBtn.innerHTML = '<span class="spinner" style="display:inline-block; border-color:white; border-top-color:transparent; margin-right:8px;"></span> Yuklanmoqda...';
            try {
                const timestamp = Date.now(), fileName = `posts/${currentUser.uid}/${timestamp}_${selectedFile.name}`;
                const { data, error } = await supabase.storage.from('videos').upload(fileName, selectedFile);
                if (error) throw error;
                const { data: { publicUrl } } = supabase.storage.from('videos').getPublicUrl(data.path);
                const isPublic = document.querySelector('input[name="visibility"]:checked').value === 'public';
                let hashedPassword = null;
                if (passwordCheck.checked && postPassword.value) hashedPassword = await hashPassword(postPassword.value);
                await addDoc(collection(db, 'posts'), { 
                    text: captionInput.value.trim() || null, mediaUrl: publicUrl, mediaType: selectedFile.type, 
                    fileName: selectedFile.name, fileSize: selectedFile.size, category: selectedCategory, isPublic, 
                    isBlurred: blurCheck.checked, hasPassword: passwordCheck.checked && !!postPassword.value, password: hashedPassword, 
                    userId: currentUser.uid, userFullName: currentUser.displayName || 'Anonim', userAvatar: currentUser.photoURL || null, 
                    createdAt: serverTimestamp(), views: 0, downloads: 0 
                });
                showToast('Post muvaffaqiyatli yuklandi', 'success'); playSound('success');
                uploadModal.classList.remove('show'); resetForm();
            } catch (error) { showToast('Xatolik: ' + error.message, 'error'); playSound('error'); }
            finally { uploadBtn.disabled = false; uploadBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Postni Yuklash'; }
        });

        // Tabs
        document.querySelectorAll('.big-tab').forEach(tab => tab.addEventListener('click', function() { document.querySelectorAll('.big-tab').forEach(bt => bt.classList.remove('active')); this.classList.add('active'); activeBigTab = this.dataset.tab; filterPosts(); }));
        document.querySelectorAll('.category-tab').forEach(tab => tab.addEventListener('click', function() { document.querySelectorAll('.category-tab').forEach(ct => ct.classList.remove('active')); this.classList.add('active'); activeCategory = this.dataset.cat; filterPosts(); }));

        function loadPosts() { 
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc')); 
            onSnapshot(q, (snap) => { allPosts = snap.docs.map(d => ({ id: d.id, ...d.data() })); filterPosts(); }, (error) => { postsFeed.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${error.message}</p></div>`; }); 
        }

        function filterPosts() { 
            let filtered = [...allPosts]; 
            if (activeBigTab === 'my' && currentUser) filtered = filtered.filter(p => p.userId === currentUser.uid); 
            else if (activeBigTab === 'public') filtered = filtered.filter(p => p.isPublic === true); 
            if (activeCategory !== 'all') filtered = filtered.filter(p => p.category === activeCategory); 
            renderPosts(filtered); 
        }

        function renderPosts(posts) {
            if (!posts.length) { postsFeed.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg><p>Hozircha postlar mavjud emas</p></div>`; return; }
            
            postsFeed.innerHTML = posts.map(p => {
                const time = p.createdAt?.toDate?.() || new Date();
                const timeStr = new Intl.DateTimeFormat('uz-UZ', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' }).format(time);
                const isOwner = currentUser && p.userId === currentUser.uid, hasBlur = p.isBlurred === true, hasPass = p.hasPassword === true && p.password, isPrivate = !p.isPublic;
                const isProtected = hasBlur || hasPass || isPrivate;
                
                let mediaHtml = '', overlayHtml = '';
                if (isProtected) {
                    if (hasPass) overlayHtml = `<div class="blur-layer" data-action="password" style="min-height:200px;display:flex;align-items:center;justify-content:center;"><div class="blur-content"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:48px;height:48px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><div class="blur-text">Parol bilan himoyalangan</div></div></div>`;
                    else if (hasBlur) overlayHtml = `<div class="blur-layer" data-action="unblur" style="min-height:200px;display:flex;align-items:center;justify-content:center;"><div class="blur-content"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:48px;height:48px;"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg><div class="blur-text">Ko'rish uchun bosing</div></div></div>`;
                    else if (isPrivate) overlayHtml = `<div class="blur-layer" data-action="private" style="min-height:200px;display:flex;align-items:center;justify-content:center;"><div class="blur-content"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:48px;height:48px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><div class="blur-text">Maxfiy post</div></div></div>`;
                    mediaHtml = `<div style="display:none;"></div>`;
                } else {
                    if (p.mediaType?.startsWith('image')) mediaHtml = `<img src="${p.mediaUrl}" loading="lazy" alt="Post" style="width:100%;max-height:400px;object-fit:cover;">`;
                    else if (p.mediaType?.startsWith('video')) mediaHtml = `<video src="${p.mediaUrl}" controls preload="metadata" style="width:100%;max-height:400px;"></video>`;
                    else if (p.mediaType?.startsWith('audio')) mediaHtml = `<audio src="${p.mediaUrl}" controls style="width:100%;"></audio>`;
                    else {
                        const ext = p.fileName?.split('.').pop()?.toLowerCase() || '';
                        const iconInfo = { icon: 'file', color: 'var(--text-secondary)' };
                        if (ext === 'pdf') { iconInfo.icon = 'pdf'; iconInfo.color = 'var(--pdf-color)'; }
                        else if (ext === 'doc' || ext === 'docx') { iconInfo.icon = 'doc'; iconInfo.color = 'var(--doc-color)'; }
                        else if (ext === 'zip' || ext === 'rar') { iconInfo.icon = 'archive'; iconInfo.color = 'var(--archive-color)'; }
                        mediaHtml = `<div class="preview-file" style="padding:20px;"><div class="file-icon" style="color:${iconInfo.color}">${getFileIconSVG(iconInfo.icon)}</div><div class="file-name">${p.fileName || 'Fayl'}</div></div>`;
                    }
                }
                
                const copyButton = !isProtected ? `<button class="copy-btn" data-url="${p.mediaUrl}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Havola</button>` : `<button class="copy-btn locked" disabled style="opacity:0.5;cursor:not-allowed;" title="Avval postni oching"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Qulflangan</button>`;
                
                return `<div class="post-card" data-id="${p.id}" data-password="${p.password || ''}" data-blur="${p.isBlurred}" data-has-password="${p.hasPassword}" data-private="${isPrivate}" data-protected="${isProtected}" data-media='${JSON.stringify(p).replace(/'/g, "&apos;").replace(/"/g, "&quot;")}'>
                    <div class="post-header"><div class="post-avatar">${(p.userFullName || 'A')[0]}</div><div class="post-info"><div class="post-author">${p.userFullName || 'Anonim'}</div><div class="post-time">${timeStr}</div></div>${isProtected ? '<span style="margin-left:auto;font-size:12px;color:var(--text-secondary);">Himoyalangan</span>' : ''}</div>
                    ${p.text ? `<div class="post-text">${escapeHtml(p.text)}</div>` : ''}
                    <div class="post-media" data-url="${p.mediaUrl}" data-type="${p.mediaType}" data-protected="${isProtected}" style="position:relative;min-height:${isProtected ? '200px' : 'auto'};">${mediaHtml}${overlayHtml}</div>
                    <span class="post-category"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-4.5A2.5 2.5 0 0 0 13 9.5v0A2.5 2.5 0 0 0 15.5 12H18"/><path d="M4 7h4.5A2.5 2.5 0 0 1 11 9.5v0A2.5 2.5 0 0 1 8.5 12H6"/><path d="M12 3v18"/></svg> ${p.category}</span>
                    <div class="post-actions">
                        <button class="view-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></svg> ${p.views || 0}</button>
                        ${copyButton}
                        ${isOwner ? `<button class="delete-btn" data-id="${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> O'chirish</button>` : ''}
                    </div>
                </div>`;
            }).join('');
            attachPostEvents();
        }

// ========== POST EVENTS (TO'LIQ TUZATILGAN) ==========
function attachPostEvents() {
    document.querySelectorAll('.post-media').forEach(el => {
        // Eski eventlarni tozalash
        el.removeEventListener('click', handleMediaClickWrapper);
        // Yangi event qo'shish
        el.addEventListener('click', handleMediaClickWrapper);
    });
    
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.removeEventListener('click', handleCopyClick);
        btn.addEventListener('click', handleCopyClick);
    });
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.removeEventListener('click', handleDeleteClick);
        btn.addEventListener('click', handleDeleteClick);
    });
}

// Wrapper funksiyalar
function handleMediaClickWrapper(e) {
    const el = e.currentTarget;
    
    // Agar video/audio kontroli bosilgan bo'lsa
    if (e.target.closest('video') || e.target.closest('audio')) {
        console.log('Video/audio control clicked');
        return;
    }
    
    // Agar tugma bosilgan bo'lsa
    if (e.target.closest('button')) {
        console.log('Button clicked');
        return;
    }
    
    console.log('Post media clicked, calling handleMediaClick');
    handleMediaClick(el);
}

function handleCopyClick(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    
    if (btn.disabled || btn.classList.contains('locked')) {
        showToast('Avval postni oching', 'error');
        return;
    }
    
    const url = btn.dataset.url;
    if (url) {
        navigator.clipboard?.writeText(url);
        showToast('Havola nusxalandi', 'success');
    }
}

function handleDeleteClick(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    
    if (!confirm("Postni o'chirmoqchimisiz?")) return;
    
    deleteDoc(doc(db, 'posts', btn.dataset.id))
        .then(() => {
            showToast('O\'chirildi', 'success');
            playSound('delete');
        })
        .catch(err => {
            showToast('Xatolik: ' + err.message, 'error');
        });
}

// ========== HANDLE MEDIA CLICK (TO'LIQ TUZATILGAN) ==========
function handleMediaClick(el) {
    const card = el.closest('.post-card');
    const overlay = el.querySelector('.blur-layer');
    
    // Post ma'lumotlarini olish
    let post;
    try {
        post = JSON.parse(card.dataset.media);
    } catch (e) {
        console.error('Post ma\'lumotlarini o\'qishda xatolik:', e);
        return;
    }
    
    console.log('Media clicked - Type:', post.mediaType, 'Has overlay:', !!overlay);
    
    // Agar overlay (blur/lock) bo'lsa
    if (overlay) {
        const action = overlay.dataset.action;
        console.log('Overlay action:', action);
        
        if (action === 'password' || post.hasPassword) {
            pendingPost = post;
            passwordModal.classList.add('show');
            passwordInput.value = '';
            passwordError.textContent = '';
        } else if (action === 'unblur' || action === 'private') {
            // Blurni o'chirish
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.remove();
                
                // Copy tugmasini yoqish
                const copyBtn = card.querySelector('.copy-btn');
                if (copyBtn) {
                    copyBtn.disabled = false;
                    copyBtn.style.opacity = '1';
                    copyBtn.style.cursor = 'pointer';
                    copyBtn.classList.remove('locked');
                    copyBtn.title = '';
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Havola`;
                }
                
                // Medianing o'zini ko'rsatish
                if (post.mediaType?.startsWith('image')) {
                    el.innerHTML = `<img src="${post.mediaUrl}" alt="Post" style="width:100%;max-height:400px;object-fit:cover;">`;
                } else if (post.mediaType?.startsWith('video')) {
                    el.innerHTML = `<video src="${post.mediaUrl}" controls style="width:100%;max-height:400px;"></video>`;
                } else if (post.mediaType?.startsWith('audio')) {
                    el.innerHTML = `<audio src="${post.mediaUrl}" controls style="width:100%;"></audio>`;
                }
            }, 300);
        }
        return;
    }
    
    // Overlay yo'q - oddiy media, FULLSCREEN OCHISH
    console.log('Opening viewer for:', post.mediaUrl);
    openViewer(post);
}

// ========== OPEN VIEWER (TEKSHIRILGAN) ==========
function openViewer(post) {
    console.log('openViewer called with:', post.mediaType, post.mediaUrl);
    
    viewerContent.innerHTML = '';
    
    if (post.mediaType?.startsWith('image')) { 
        const img = document.createElement('img'); 
        img.src = post.mediaUrl; 
        img.alt = post.fileName || 'Post';
        img.style.maxWidth = '100%';
        img.style.maxHeight = '85vh';
        img.style.objectFit = 'contain';
        img.onload = () => console.log('Image loaded successfully');
        img.onerror = (e) => console.error('Image failed to load:', e);
        viewerContent.appendChild(img); 
    } else if (post.mediaType?.startsWith('video')) { 
        const v = document.createElement('video'); 
        v.src = post.mediaUrl; 
        v.controls = true; 
        v.autoplay = true; 
        v.style.maxWidth = '100%';
        v.style.maxHeight = '85vh';
        viewerContent.appendChild(v); 
    } else if (post.mediaType?.startsWith('audio')) { 
        const a = document.createElement('audio'); 
        a.src = post.mediaUrl; 
        a.controls = true; 
        a.autoplay = true; 
        a.style.width = '100%';
        a.style.maxWidth = '500px';
        viewerContent.appendChild(a); 
    } else { 
        viewerContent.innerHTML = `
            <div style="color:white;text-align:center;padding:40px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:80px;height:80px;margin-bottom:20px;">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                </svg>
                <h2>${post.fileName || 'Hujjat'}</h2>
                <div style="margin-top:20px;">
                    <a href="${post.mediaUrl}" target="_blank" style="background:var(--primary);color:white;padding:12px 24px;border-radius:30px;text-decoration:none;">Yuklab olish</a>
                </div>
            </div>
        `; 
    }
    
    viewerOverlay.classList.add('show');
    console.log('Viewer overlay is now visible');
}
        
        closeViewerBtn.addEventListener('click', () => { viewerOverlay.classList.remove('show'); viewerContent.innerHTML = ''; });
        viewerOverlay.addEventListener('click', (e) => { if (e.target === viewerOverlay) { viewerOverlay.classList.remove('show'); viewerContent.innerHTML = ''; } });

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showToast(m, type) { 
            let icon = ''; 
            if (type === 'success') icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
            else if (type === 'error') icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            else if (type === 'paste') icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            else icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><circle cx="12" cy="8" r="1"/></svg>';
            toast.innerHTML = `${icon} ${m}`; toast.className = `toast show ${type}`; setTimeout(() => toast.classList.remove('show'), 3500); 
        }
    </script>
</body>
