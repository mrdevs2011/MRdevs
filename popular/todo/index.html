<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todo | MRDEV</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../../assets/dropdown.css">
</head>
<body>
    <header class="todo-header">
        <a href="../../" class="back-btn" title="Orqaga">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Orqaga</span>
        </a>
        <div class="header-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <span>Todo</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejim">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg>
            </button>
            <button class="mrdev-user-trigger" id="mrdevUserTrigger">
                <div class="trigger-avatar" id="triggerAvatar">?</div>
                <span class="trigger-name" id="triggerName">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
        </div>
    </header>

    <main class="todo-main">
        <!-- Summary -->
        <div class="summary-card">
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Jami</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">Bajarilgan</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="pendingTasks">0</div>
                    <div class="stat-label">Kutilmoqda</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Add Task -->
        <div class="add-card">
            <input type="text" id="taskTitle" class="tawindow.__ENV__?.OPENAI_API_KEY || """ placeholder="Yangi vazifa qo'shish...">
            <div class="add-row">
                <select id="taskPriority" class="priority-select">
                    <option value="low">Past</option>
                    <option value="medium" selected>O'rta</option>
                    <option value="high">Muhim</option>
                </select>
                <button class="add-btn" id="addTaskBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Qo'shish
                </button>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-row">
            <button class="filter-btn active" data-filter="all">Barchasi</button>
            <button class="filter-btn" data-filter="active">Faol</button>
            <button class="filter-btn" data-filter="completed">Bajarilgan</button>
        </div>

        <!-- Task List -->
        <div id="taskList" class="tawindow.__ENV__?.OPENAI_API_KEY || """></div>

        <!-- Empty -->
        <div id="emptyState" class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p>Vazifalar mavjud emas</p>
            <small>Yangi vazifa qo'shing</small>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="./script.js"></script>
</body>
</html>
