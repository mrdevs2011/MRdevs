<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR AI — Cheksiz Xotira</title>
    <link rel="icon" href="ai.svg" type="image/svg+xml">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

    <!-- App CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- MathJax config -->
        <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://esm.sh/firebase/app",
        "firebase/auth": "https://esm.sh/firebase/auth",
        "firebase/firestore": "https://esm.sh/firebase/firestore",
        "firebase/database": "https://esm.sh/firebase/database",
        "firebase/storage": "https://esm.sh/firebase/storage",
        "firebase/analytics": "https://esm.sh/firebase/analytics",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js"
      }
    }
    </script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath:  [['$','$'],['\\(','\\)']],
                displayMath: [['$$','$$'],['\\[','\\]']],
                processEscapes: true
            },
            options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
        };
    </script>
</head>
<body>

<!-- ==================== REDIRECT SCREEN ==================== -->
<div id="redirect-screen">
    <div class="spinner"></div>
    <div class="logo"><span class="mr">MR</span><span class="dev">DEV</span></div>
    <p>Autentifikatsiya tekshirilmoqda...</p>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="app-wrapper" style="display:none; width:100%; height:100dvh; position:relative; overflow:hidden;">

    <div id="sidebar-overlay"></div>

    <!-- ==================== SIDEBAR ==================== -->
    <aside id="sidebar" aria-label="Suhbat arxivi">

        <div class="sidebar-header">
            <span class="sidebar-title">
                <i class="fas fa-clock-rotate-left" style="margin-right:6px;opacity:0.7"></i>ARXIV
            </span>
            <button class="sidebar-close-btn" onclick="toggleSidebar()" aria-label="Yopish">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <div style="padding: 12px 12px 0;">
            <button onclick="createNewChat()" style="
                width:100%; padding:11px; border-radius:12px;
                border:1px solid rgba(86,179,250,0.25);
                background:rgba(86,179,250,0.06);
                color:var(--accent); font-size:13px; font-weight:600;
                cursor:pointer; display:flex; align-items:center;
                justify-content:center; gap:8px; transition:all 0.3s ease;">
                <i class="fas fa-plus"></i> Yangi suhbat
            </button>
        </div>

        <div id="history-box">
            <div class="history-empty">
                <i class="fas fa-comment-dots" style="font-size:24px;margin-bottom:8px;display:block;opacity:0.4"></i>
                Hali suhbat yo'q
            </div>
        </div>

        <div class="sidebar-user">
            <a href="../../" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                MRDEV ga qaytish
            </a>

            <div class="user-row">
                <div class="user-avatar" id="s-avatar">?</div>
                <div class="user-info">
                    <div class="user-name"  id="s-name">Yuklanmoqda...</div>
                    <div class="user-email" id="s-email"></div>
                    <div class="user-mrdev-badge" id="s-badge" style="display:none;">
                        <i class="fas fa-id-badge"></i>
                        <span id="s-badge-text"></span>
                    </div>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Chiqish</span>
            </button>
        </div>
    </aside>

    <!-- ==================== MAIN ==================== -->
    <div id="main">

        <header>
            <div class="header-left">
                <button class="icon-btn" onclick="toggleSidebar()" aria-label="Menyu">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                <div class="header-logo">
                    <span class="mr">MR</span><span class="ai">AI</span>
                </div>
                <span id="chat-title"></span>
            </div>
            <div class="header-right">
                <div class="memory-badge">
                    <i class="fas fa-brain"></i>
                    <span>Xotira</span>
                </div>
                <button class="icon-btn" onclick="createNewChat()" title="Yangi suhbat">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
        </header>

        <div id="chat-window"></div>

        <div class="input-wrapper">
            <div class="input-box">
                <div class="mode-wrap">
                    <button id="mode-btn" onclick="toggleModeMenu()" title="Rejim">
                        <i class="fas fa-bolt" id="mode-icon"></i>
                    </button>
                    <div id="mode-menu" class="mode-menu">
                        <div class="mode-opt active" onclick="setMode('fast')">
                            <i class="fas fa-bolt"></i> <span>Tezkor</span>
                        </div>
                        <div class="mode-opt" onclick="setMode('think')">
                            <i class="fas fa-brain"></i> <span>Fikrlovchi</span>
                        </div>
                        <div class="mode-opt" onclick="setMode('expert')">
                            <i class="fas fa-star"></i> <span>Ekspert</span>
                        </div>
                    </div>
                </div>

                <textarea
                    id="user-input"
                    rows="1"
                    placeholder="MR AI dan so'rang..."
                    onkeydown="handleEnter(event)"
                    autocomplete="off"
                ></textarea>

                <button id="send-btn" class="send-btn" data-status="idle" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                    <i class="fas fa-stop"></i>
                </button>
            </div>
            <div class="input-footer">
                Muhammadrasul tomonidan asos solingan &nbsp;·&nbsp; MRDEV
            </div>
        </div>

        <!-- Floating Audio Player -->
        <div id="audio-player">
            <div class="audio-content">
                <button class="audio-ctrl" onclick="closeAudioPlayer()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="progress-track" onclick="toggleAudio()">
                    <div id="progress-fill"></div>
                </div>
                <button class="audio-ctrl" id="play-pause-btn" onclick="toggleAudio()">
                    <i class="fas fa-pause"></i>
                </button>
            </div>
        </div>

    </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- App Script (ES Module — Vite bundle qiladi) -->
<script type="module" src="./script.js"></script>

</body>
</html>
