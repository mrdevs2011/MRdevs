<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes | MRDEV</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../../assets/dropdown.css">
</head>
<body>
    <header class="notes-header">
        <a href="../../" class="back-btn" title="Orqaga">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Orqaga</span>
        </a>
        <div class="header-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span>Notes</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" title="Rejimni almashtirish">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button class="icon-btn" id="syncBtn" title="Cloud sinxronlash">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
            </button>
            <!-- MRDEV Dropdown Trigger -->
            <button class="mrdev-user-trigger" id="mrdevUserTrigger">
                <div class="trigger-avatar" id="triggerAvatar">?</div>
                <span class="trigger-name" id="triggerName">Mehmon</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="notes-main">
        <!-- Qidiruv -->
        <div class="search-bar">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Eslatmalarni qidirish...">
            <button id="clearSearch" class="clear-search" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Yangi eslatma -->
        <div class="new-note-card">
            <input type="text" id="noteTitle" class="title-input" placeholder="Sarlavha...">
            <textarea id="noteContent" class="content-input" placeholder="Eslatma yozing..." rows="3"></textarea>
            <div class="note-actions-row">
                <div class="color-options">
                    <button class="color-dot active" data-color="#FFD700" style="background:#FFD700" title="Sariq"></button>
                    <button class="color-dot" data-color="#98FB98" style="background:#98FB98" title="Yashil"></button>
                    <button class="color-dot" data-color="#87CEEB" style="background:#87CEEB" title="Ko'k"></button>
                    <button class="color-dot" data-color="#FFB6C1" style="background:#FFB6C1" title="Pushti"></button>
                    <button class="color-dot" data-color="#DDA0DD" style="background:#DDA0DD" title="Binafsha"></button>
                    <button class="color-dot" data-color="#FFFFFF" style="background:#FFFFFF;border:2px solid var(--border)" title="Oq"></button>
                </div>
                <button id="addNoteBtn" class="add-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Qo'shish
                </button>
            </div>
        </div>

        <!-- Eslatmalar ro'yxati -->
        <div class="notes-grid" id="notesGrid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Yuklanmoqda...</p>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">Eslatmani tahrirlash</h3>
                <button class="modal-close" id="closeEditModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <input type="text" id="editTitle" class="modal-input" placeholder="Sarlavha">
                <textarea id="editContent" class="modal-textarea" placeholder="Eslatma matni..." rows="6"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelEdit">Bekor qilish</button>
                <button class="btn-primary" id="saveEdit">Saqlash</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="./script.js"></script>
</body>
</html>
