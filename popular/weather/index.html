<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Weather - MRDEV</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" href="../../favicons/weather.svg" type="image/svg+xml">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow-x: hidden;
        }

        .weather-wrapper {
            min-height: calc(100vh - 60px);
            min-height: calc(100dvh - 60px);
            background: var(--bg);
            padding: 20px;
            overflow-x: hidden;
        }

        .weather-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-section {
            margin-bottom: 24px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            background: var(--surface);
            border-radius: 48px;
            padding: 4px 4px 4px 20px;
            border: 1px solid var(--border);
        }

        .search-input {
            flex: 1;
            padding: 14px 0;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn, .location-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .search-btn:active, .location-btn:active {
            transform: scale(0.94);
        }

        .search-btn {
            background: var(--blue);
            color: white;
        }

        .current-weather {
            background: var(--surface);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .location-name {
            font-family: 'Google Sans', sans-serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .location-time {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .temperature {
            font-size: 56px;
            font-weight: 600;
            color: var(--text);
        }

        .temperature span {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .weather-desc {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .detail-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .forecast-section {
            background: var(--surface);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forecast-list {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding-bottom: 8px;
        }

        .forecast-list::-webkit-scrollbar {
            height: 4px;
        }

        .forecast-item {
            min-width: 100px;
            text-align: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .forecast-day {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .forecast-icon {
            width: 48px;
            height: 48px;
            margin: 8px auto;
        }

        .forecast-temp {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .forecast-temp span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .retry-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            cursor: pointer;
        }

        .suggestions {
            background: var(--surface);
            border-radius: 24px;
            margin-top: 8px;
            border: 1px solid var(--border);
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:active {
            background: var(--hover);
        }

        @media (max-width: 500px) {
            .weather-wrapper {
                padding: 12px;
            }
            .current-weather {
                padding: 20px;
            }
            .temperature {
                font-size: 44px;
            }
            .weather-icon {
                width: 64px;
                height: 64px;
            }
            .detail-value {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="header-btn" onclick="window.history.back()" aria-label="Orqaga">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <a href="../../popular/" class="logo">
                <span class="logo-mr">MR</span><span class="logo-dev">DEV</span>
            </a>
            <span style="color: var(--text-secondary); font-size: 14px; margin-left: 4px; font-weight: 400;">/ Weather</span>
        </div>
        <button id="theme-btn" class="header-btn theme-btn" onclick="toggleTheme()" aria-label="Rejimni almashtirish"></button>
    </header>

    <div class="weather-wrapper">
        <div class="weather-container">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="cityInput" class="search-input" placeholder="Shahar nomi (masalan: Toshkent, London, New York)" autocomplete="off">
                    <button class="location-btn" id="locationBtn" title="Mening joyim">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                        </svg>
                    </button>
                    <button class="search-btn" id="searchBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>
                <div id="suggestions" class="suggestions"></div>
            </div>

            <div id="currentWeather" class="current-weather">
                <div class="location-name" id="cityName">--</div>
                <div class="location-time" id="localTime">--:--</div>
                <div class="weather-main">
                    <img id="weatherIcon" class="weather-icon" src="" alt="">
                    <div class="temperature" id="temperature">--<span>°C</span></div>
                </div>
                <div class="weather-desc" id="description">---</div>
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-value" id="humidity">--%</div>
                        <div class="detail-label">Namlik</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-value" id="wind">-- km/h</div>
                        <div class="detail-label">Shamol</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-value" id="pressure">-- hPa</div>
                        <div class="detail-label">Bosim</div>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <line x1="8" y1="10" x2="16" y2="10"/>
                    </svg>
                    5 kunlik prognoz
                </div>
                <div class="forecast-list" id="forecastList">
                    <div class="loading-state">Yuklanmoqda...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../script.js"></script>
    <script>
        // OpenWeatherMap API (bepul, ro'yxatdan o'tish shart emas - demo key)
        // O'zingizning API keyingizni qo'yishingiz mumkin: https://home.openweathermap.org/api_keys
        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';  // OpenWeatherMap demo key - cheklangan
        const GEO_API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
        
        let currentCity = 'Tashkent';
        let searchTimeout = null;

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const locationBtn = document.getElementById('locationBtn');
        const suggestionsDiv = document.getElementById('suggestions');
        const cityNameEl = document.getElementById('cityName');
        const localTimeEl = document.getElementById('localTime');
        const weatherIcon = document.getElementById('weatherIcon');
        const temperatureEl = document.getElementById('temperature');
        const descriptionEl = document.getElementById('description');
        const humidityEl = document.getElementById('humidity');
        const windEl = document.getElementById('wind');
        const pressureEl = document.getElementById('pressure');
        const forecastList = document.getElementById('forecastList');

        function getWeatherIconUrl(iconCode) {
            if (!iconCode) return '';
            return `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        }

        function formatLocalTime(timestamp, timezoneOffset) {
            try {
                const date = new Date(timestamp * 1000);
                const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
                const localDate = new Date(utc + (timezoneOffset * 1000));
                return localDate.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
            } catch(e) {
                return '--:--';
            }
        }

        function formatDay(timestamp) {
            const date = new Date(timestamp * 1000);
            const days = ['Yak', 'Dush', 'Sesh', 'Chor', 'Pay', 'Jum', 'Shan'];
            return days[date.getDay()];
        }

        function getCountryName(code) {
            const countries = {
                'UZ': 'O\'zbekiston', 'US': 'AQSH', 'GB': 'Buyuk Britaniya', 'RU': 'Rossiya',
                'DE': 'Germaniya', 'FR': 'Fransiya', 'IT': 'Italiya', 'ES': 'Ispaniya',
                'TR': 'Turkiya', 'AE': 'BAA', 'SA': 'Saudiya Arabistoni', 'CN': 'Xitoy',
                'JP': 'Yaponiya', 'IN': 'Hindiston', 'KR': 'Koreya', 'CA': 'Kanada'
            };
            return countries[code] || code;
        }

        async function getWeatherByCoords(lat, lon) {
            showLoading();
            
            try {
                const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=uz`;
                const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=uz`;
                
                const [weatherRes, forecastRes] = await Promise.all([
                    fetch(weatherUrl),
                    fetch(forecastUrl)
                ]);
                
                if (!weatherRes.ok) {
                    const errorData = await weatherRes.json();
                    throw new Error(errorData.message || 'Ob-havo ma\'lumoti topilmadi');
                }
                
                const weatherData = await weatherRes.json();
                const forecastData = await forecastRes.json();
                
                updateUI(weatherData, forecastData);
                
                const countryName = getCountryName(weatherData.sys.country);
                cityNameEl.textContent = `${weatherData.name}, ${countryName}`;
                cityInput.value = weatherData.name;
                
            } catch (error) {
                console.error('Weather error:', error);
                showError(error.message || 'Ma\'lumot olishda xatolik');
            }
        }

        async function getWeatherByCity(city) {
            if (!city || city.trim().length < 2) {
                showError('Iltimos, shahar nomini to\'liq kiriting');
                return;
            }
            
            showLoading();
            
            try {
                const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=uz`;
                const weatherRes = await fetch(weatherUrl);
                
                if (!weatherRes.ok) {
                    if (weatherRes.status === 404) throw new Error('Shahar topilmadi');
                    throw new Error('Ma\'lumot olishda xatolik');
                }
                
                const weatherData = await weatherRes.json();
                
                const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?lat=${weatherData.coord.lat}&lon=${weatherData.coord.lon}&appid=${API_KEY}&units=metric&lang=uz`;
                const forecastRes = await fetch(forecastUrl);
                const forecastData = await forecastRes.json();
                
                updateUI(weatherData, forecastData);
                
                const countryName = getCountryName(weatherData.sys.country);
                cityNameEl.textContent = `${weatherData.name}, ${countryName}`;
                cityInput.value = weatherData.name;
                suggestionsDiv.classList.remove('show');
                
            } catch (error) {
                console.error('City search error:', error);
                showError(error.message || 'Shahar topilmadi');
            }
        }

        function updateUI(weatherData, forecastData) {
            // Current weather
            const temp = Math.round(weatherData.main.temp);
            temperatureEl.innerHTML = `${temp}<span>°C</span>`;
            descriptionEl.textContent = weatherData.weather[0].description;
            humidityEl.textContent = `${weatherData.main.humidity}%`;
            windEl.textContent = `${Math.round(weatherData.wind.speed * 3.6)} km/h`;
            pressureEl.textContent = `${weatherData.main.pressure} hPa`;
            
            const iconUrl = getWeatherIconUrl(weatherData.weather[0].icon);
            if (iconUrl) weatherIcon.src = iconUrl;
            
            localTimeEl.textContent = formatLocalTime(weatherData.dt, weatherData.timezone);
            
            // Forecast
            const dailyForecasts = {};
            
            forecastData.list.forEach(item => {
                const date = new Date(item.dt * 1000);
                const day = date.toISOString().split('T')[0];
                
                if (!dailyForecasts[day]) {
                    dailyForecasts[day] = {
                        temp_min: item.main.temp_min,
                        temp_max: item.main.temp_max,
                        icon: item.weather[0].icon,
                        dt: item.dt
                    };
                } else {
                    dailyForecasts[day].temp_min = Math.min(dailyForecasts[day].temp_min, item.main.temp_min);
                    dailyForecasts[day].temp_max = Math.max(dailyForecasts[day].temp_max, item.main.temp_max);
                }
            });
            
            const forecastArray = Object.values(dailyForecasts);
            const next5Days = forecastArray.slice(1, 6);
            
            if (next5Days.length > 0) {
                forecastList.innerHTML = next5Days.map(day => `
                    <div class="forecast-item">
                        <div class="forecast-day">${formatDay(day.dt)}</div>
                        <img class="forecast-icon" src="${getWeatherIconUrl(day.icon)}" alt="">
                        <div class="forecast-temp">
                            ${Math.round(day.temp_max)}<span>°</span> / ${Math.round(day.temp_min)}<span>°</span>
                        </div>
                    </div>
                `).join('');
            } else {
                forecastList.innerHTML = '<div class="error-state">Prognoz ma\'lumoti yo\'q</div>';
            }
        }

        function getUserLocation() {
            if (!navigator.geolocation) {
                showError('GPS qurilmangizda mavjud emas');
                return;
            }
            
            showLoading();
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    getWeatherByCoords(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    let message = 'Joylashuv aniqlanmadi';
                    if (error.code === 1) message = 'Iltimos, joylashuv ruxsatini bering';
                    if (error.code === 2) message = 'Joylashuv aniqlanmadi';
                    if (error.code === 3) message = 'Joylashuv vaqti tugadi';
                    showError(message);
                    getWeatherByCity('Tashkent');
                }
            );
        }

        async function searchCities(query) {
            if (!query || query.length < 2) {
                suggestionsDiv.classList.remove('show');
                return;
            }
            
            try {
                const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=8&appid=${API_KEY}`);
                const data = await res.json();
                
                if (data && data.length > 0) {
                    suggestionsDiv.innerHTML = data.map(city => `
                        <div class="suggestion-item" data-name="${city.name}" data-lat="${city.lat}" data-lon="${city.lon}" data-country="${city.country || ''}">
                            <strong>${city.name}</strong>
                            ${city.state ? `, ${city.state}` : ''}
                            ${city.country ? ` (${city.country})` : ''}
                        </div>
                    `).join('');
                    suggestionsDiv.classList.add('show');
                    
                    document.querySelectorAll('.suggestion-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const lat = parseFloat(item.dataset.lat);
                            const lon = parseFloat(item.dataset.lon);
                            const name = item.dataset.name;
                            
                            if (lat && lon && !isNaN(lat) && !isNaN(lon)) {
                                getWeatherByCoords(lat, lon);
                            } else {
                                getWeatherByCity(name);
                            }
                            cityInput.value = name;
                            suggestionsDiv.classList.remove('show');
                        });
                    });
                } else {
                    suggestionsDiv.classList.remove('show');
                }
            } catch (error) {
                console.error('Search error:', error);
                suggestionsDiv.classList.remove('show');
            }
        }

        function showLoading() {
            cityNameEl.textContent = 'Yuklanmoqda...';
            temperatureEl.innerHTML = '--<span>°C</span>';
            descriptionEl.textContent = '---';
            humidityEl.textContent = '--%';
            windEl.textContent = '-- km/h';
            pressureEl.textContent = '-- hPa';
            forecastList.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Ob-havo ma\'lumoti yuklanmoqda...</p></div>';
        }

        function showError(message) {
            cityNameEl.textContent = 'Xatolik';
            temperatureEl.innerHTML = '--<span>°C</span>';
            descriptionEl.textContent = message;
            humidityEl.textContent = '--%';
            windEl.textContent = '-- km/h';
            pressureEl.textContent = '-- hPa';
            forecastList.innerHTML = `
                <div class="error-state">
                    <p>${message}</p>
                    <button class="retry-btn" onclick="getUserLocation()">Qayta urunish</button>
                </div>
            `;
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) getWeatherByCity(city);
        });
        
        locationBtn.addEventListener('click', getUserLocation);
        
        cityInput.addEventListener('input', (e) => {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchCities(e.target.value.trim());
            }, 500);
        });
        
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) getWeatherByCity(city);
                suggestionsDiv.classList.remove('show');
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!cityInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.classList.remove('show');
            }
        });

        getUserLocation();
    </script>
</body>
</html>
